<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ R4 Multi-Macro OS</title>
    <style>
        :root {
            --bg-color: #060711;
            --card-bg: #0f1122;
            --primary: #00f2fe;
            --secondary: #4facfe;
            --accent-purple: #7209b7;
            --accent-red: #ff4757;
            --accent-green: #2ed573;
            --text-main: #ffffff;
            --text-muted: #6c7d98;
        }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background-color: var(--bg-color); color: var(--text-main); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        h2 { font-weight: 800; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 5px; background: linear-gradient(45deg, var(--primary), var(--secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .sub-header { color: var(--text-muted); font-size: 13px; margin-bottom: 25px; }
        .status-container { font-size: 13px; font-weight: bold; background: rgba(255,165,0,0.08); border: 1px solid rgba(255,165,0,0.2); padding: 8px 24px; border-radius: 50px; color: #ffa500; margin-bottom: 20px; }
        .card { background: var(--card-bg); width: 100%; max-width: 450px; padding: 24px; border-radius: 20px; box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6); border: 1px solid rgba(255, 255, 255, 0.02); margin-bottom: 20px; box-sizing: border-box; text-align: left; }
        .card h3 { margin-top: 0; font-size: 14px; text-transform: uppercase; letter-spacing: 1px; color: var(--secondary); margin-bottom: 15px; }
        input[type=text], select { width: 100%; padding: 13px; margin: 6px 0 14px 0; font-size: 14px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.05); background: #171932; color: #fff; box-sizing: border-box; outline: none; }
        .slider-wrapper { display: flex; align-items: center; gap: 15px; margin: 6px 0 14px 0; }
        input[type=range] { flex: 1; -webkit-appearance: none; background: #171932; height: 6px; border-radius: 5px; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 18px; height: 18px; border-radius: 50%; background: var(--primary); cursor: pointer; }
        button { background: linear-gradient(135deg, var(--secondary) 0%, var(--primary) 100%); color: white; padding: 13px; border: none; border-radius: 8px; font-size: 14px; font-weight: 700; width: 100%; cursor: pointer; margin-bottom: 8px; }
        .btn-sub { background: #1d2147; color: var(--primary); border: 1px solid rgba(0, 242, 254, 0.2); }
        .btn-add { background: linear-gradient(135deg, var(--accent-purple) 0%, #560bad 100%); }
        .btn-panic { background: #ff4757; }
        .bucket-list { background: #13152c; padding: 12px; border-radius: 8px; margin-bottom: 15px; font-size: 13px; border-left: 3px solid var(--primary); max-height: 150px; overflow-y: auto; }
        .shortcut-item { background: #171932; padding: 14px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .shortcut-info { font-size: 14px; }
        .shortcut-info div { font-size: 11px; color: var(--text-muted); margin-top: 3px; white-space: pre-line; }
        .btn-run { width: auto; padding: 8px 16px; font-size: 12px; background: var(--accent-green); margin: 0; }
        .data-display { background: #171932; padding: 16px; border-radius: 10px; text-align: center; font-family: monospace; font-size: 24px; font-weight: bold; color: var(--primary); text-shadow: 0 0 8px var(--primary); }
        .param-group { background: rgba(255,255,255,0.03); padding: 10px; border-radius: 8px; margin: 8px 0; }
        .param-group label { font-size: 12px; color: var(--text-muted); display: block; margin-bottom: 2px; }
        .param-group .slider-wrapper { margin: 4px 0; }
        .param-group .slider-wrapper output { font-family: monospace; width: 35px; font-size: 13px; color: var(--primary); }
    </style>
</head>
<body>

    <h2>⚡ R4 OS</h2>
    <div class="sub-header">System Super-Skrótów Wielozadaniowych</div>
    
    <div class="status-container" id="statusBox">🔴 Magistrala BLE zablokowana</div>
    
    <div class="card" style="text-align: center;">
        <button onclick="connectBLE()">🔗 URUCHOM SYGNAŁ BLE</button>
    </div>

    <!-- KREATOR MULTI-SKRÓTÓW -->
    <div class="card">
        <h3>🛠️ Kreator Skrótów Wielozadaniowych</h3>
        
        <div style="background: rgba(255,255,255,0.02); padding: 12px; border-radius: 10px; margin-bottom: 15px;">
            <span style="font-size: 12px; color: var(--primary); font-weight: bold;">KROK 1: Dodaj pojedyncze akcje do pamięci podręcznej</span><br><br>
            
            <label>Wybierz Port (Pin):</label>
            <select id="actionPin">
                <script>for(let i=2; i<=13; i++) document.write(`<option value="${i}">Pin ${i}</option>`);</script>
            </select>

            <label>Jasność / Napięcie PWM:</label>
            <div class="slider-wrapper">
                <input type="range" id="actionVal" min="0" max="255" value="255" oninput="this.nextElementSibling.value = this.value">
                <output style="font-family: monospace; width:30px;">255</output>
            </div>

            <label>Efekt pracy linii:</label>
            <select id="actionMode" onchange="toggleTimingParams()">
                <option value="0">Stałe zasilanie (ON)</option>
                <option value="1">Miganie (Stroboskop)</option>
                <option value="2">Pulsowanie (Oddech)</option>
            </select>

            <!-- Parametry czasowe dla migania -->
            <div id="timingParams" style="display: none; margin-top: 10px; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 12px;">
                <div class="param-group">
                    <label>⏱️ Czas WŁĄCZONY (ms) – dla migania</label>
                    <div class="slider-wrapper">
                        <input type="range" id="timeOn" min="50" max="2000" value="200" step="10" oninput="this.nextElementSibling.value = this.value">
                        <output>200</output>
                    </div>
                </div>
                <div class="param-group">
                    <label>⏱️ Czas WYŁĄCZONY (ms) – dla migania</label>
                    <div class="slider-wrapper">
                        <input type="range" id="timeOff" min="50" max="2000" value="200" step="10" oninput="this.nextElementSibling.value = this.value">
                        <output>200</output>
                    </div>
                </div>
                <div class="param-group">
                    <label>🌊 Czas narastania/opadania (ms) – dla pulsowania</label>
                    <div class="slider-wrapper">
                        <input type="range" id="timeRamp" min="100" max="5000" value="1000" step="50" oninput="this.nextElementSibling.value = this.value">
                        <output>1000</output>
                    </div>
                </div>
            </div>
            
            <button class="btn-sub" onclick="addActionToBucket()">➕ DODAJ AKCJĘ DO KOSZYKA</button>
        </div>

        <div id="bucketContainer" style="display:none;">
            <label>Zawartość koszyka akcji:</label>
            <div class="bucket-list" id="bucketList"></div>
            
            <label>KROK 2: Nadaj nazwę i zapisz cały skrót:</label>
            <input type="text" id="macroName" placeholder="np. Tryb Impreza, Reset Warsztatu">
            <button class="btn-add" onclick="saveSuperShortcut()">💾 ZAPISZ CAŁY SUPER-SKRÓT</button>
        </div>
    </div>

    <!-- PANEL SKRÓTÓW -->
    <div class="card">
        <h3>📱 Panel Aktywnych Super-Skrótów</h3>
        <div id="shortcutsContainer">
            <p id="emptyPrompt" style="font-size: 13px; color: var(--text-muted); text-align: center; margin: 5px 0;">Koszyk skrótów jest pusty.</p>
        </div>
    </div>

    <!-- SKANER WEJŚĆ -->
    <div class="card" style="border: 1px solid rgba(0, 242, 254, 0.12);">
        <h3>🔍 Uniwersalny Skaner Wejść (Czujniki)</h3>
        <label>Wybierz Pin wejściowy:</label>
        <select id="readPin" onchange="sendReadConfig()">
            <option value="NONE">-- Wyłączone --</option>
            <script>
                for(let i=2; i<=13; i++) document.write(`<option value="${i}">Pin Cyfrowy ${i}</option>`);
                for(let i=0; i<=5; i++) document.write(`<option value="A${i}">Pin Analogowy A${i}</option>`);
            </script>
        </select>

        <label>Sposób próbkowania danych:</label>
        <select id="readType" onchange="sendReadConfig()">
            <option value="1">Cyfrowy (0 lub 1 - np. Czujnik PIR, Stan niski/wysoki)</option>
            <option value="2">Analogowy (0 do 1023 - np. Fotorezystor, Sensor gazu)</option>
        </select>

        <div class="data-display" id="liveDataDisplay">---</div>
    </div>

    <div class="card" style="text-align: center; background: rgba(255, 71, 87, 0.02);">
        <button class="btn-panic" onclick="panicReset()">🛑 ZEROWANIE SYSTEMU</button>
    </div>

    <script>
        let bluetoothCharacteristic = null;
        let currentBucket = [];
        let superShortcuts = [];

        // Pokazuje/ukrywa parametry czasowe w zależności od wybranego trybu
        function toggleTimingParams() {
            const mode = document.getElementById('actionMode').value;
            const params = document.getElementById('timingParams');
            params.style.display = (mode === '1' || mode === '2') ? 'block' : 'none';
        }

        async function connectBLE() {
            const serviceUuid = "19b10000-e8f2-537e-4f6c-d104768a1214";
            const characteristicUuid = "19b10001-e8f2-537e-4f6c-d104768a1214";
            try {
                document.getElementById('statusBox').innerText = "🟡 Wyszukiwanie...";
                const device = await navigator.bluetooth.requestDevice({
                    filters: [{ name: 'Smartwatch_R4' }], optionalServices: [serviceUuid]
                });
                const server = await device.gatt.connect();
                const service = await server.getPrimaryService(serviceUuid);
                bluetoothCharacteristic = await service.getCharacteristic(characteristicUuid);

                await bluetoothCharacteristic.startNotifications();
                bluetoothCharacteristic.addEventListener('characteristicvaluechanged', (e) => {
                    const data = new TextDecoder().decode(e.target.value);
                    if(data.startsWith("VAL:")) document.getElementById('liveDataDisplay').innerText = data.substring(4);
                });
                document.getElementById('statusBox').innerText = "🟢 System Połączony (BLE)";
                document.getElementById('statusBox').style.color = "#2ed573";
            } catch (e) { document.getElementById('statusBox').innerText = "🔴 Brak autoryzacji BLE"; }
        }

        async function sendData(text) {
            if (!bluetoothCharacteristic) return;
            await bluetoothCharacteristic.writeValue(new TextEncoder().encode(text));
        }

        function addActionToBucket() {
            const pin = document.getElementById('actionPin').value;
            const val = document.getElementById('actionVal').value;
            const mode = document.getElementById('actionMode').value;
            const modeTxt = document.getElementById('actionMode').options[document.getElementById('actionMode').selectedIndex].text;

            // Pobieranie parametrów czasowych
            const timeOn = document.getElementById('timeOn').value;
            const timeOff = document.getElementById('timeOff').value;
            const timeRamp = document.getElementById('timeRamp').value;

            currentBucket.push({ 
                pin, val, mode, modeTxt,
                timeOn, timeOff, timeRamp 
            });
            
            const list = document.getElementById('bucketList');
            list.innerHTML = currentBucket.map(a => {
                let extra = '';
                if (a.mode === '1') extra = `, ON:${a.timeOn}ms OFF:${a.timeOff}ms`;
                if (a.mode === '2') extra = `, Rampa:${a.timeRamp}ms`;
                return `• Pin ${a.pin} -> Moc: ${a.val} (${a.modeTxt}${extra})`;
            }).join('<br>');
            document.getElementById('bucketContainer').style.display = "block";
        }

        function saveSuperShortcut() {
            const name = document.getElementById('macroName').value || "Super Skrót";
            if(currentBucket.length === 0) return;
            superShortcuts.push({ name, actions: [...currentBucket] });
            currentBucket = [];
            document.getElementById('bucketContainer').style.display = "none";
            document.getElementById('macroName').value = "";
            renderSuperShortcuts();
        }

        function renderSuperShortcuts() {
            const container = document.getElementById('shortcutsContainer');
            container.innerHTML = "";
            if(superShortcuts.length === 0) {
                container.innerHTML = `<p style="font-size: 13px; color: var(--text-muted); text-align: center; margin: 5px 0;">Koszyk skrótów jest pusty.</p>`;
                return;
            }
            superShortcuts.forEach((sc, idx) => {
                const desc = sc.actions.map(a => {
                    let extra = '';
                    if (a.mode === '1') extra = `, ON:${a.timeOn}ms OFF:${a.timeOff}ms`;
                    if (a.mode === '2') extra = `, Rampa:${a.timeRamp}ms`;
                    return `• Pin ${a.pin} (${a.modeTxt}${extra}, PWM: ${a.val})`;
                }).join('\n');
                const div = document.createElement('div');
                div.className = "shortcut-item";
                div.innerHTML = `<div class="shortcut-info"> <strong>${sc.name}</strong> <div>${desc}</div> </div> <button class="btn-run" onclick="runSuperShortcut(${idx})">ODPAL ALL</button>`;
                container.appendChild(div);
            });
        }

        function runSuperShortcut(idx) {
            const sc = superShortcuts[idx];
            // Format: SHORT_P:3,V:255,M:1,ON:200,OFF:200;P:5,V:128,M:2,RAMP:1000;
            const cmd = "SHORT_" + sc.actions.map(a => {
                let params = `P:${a.pin},V:${a.val},M:${a.mode}`;
                if (a.mode === '1') params += `,ON:${a.timeOn},OFF:${a.timeOff}`;
                if (a.mode === '2') params += `,RAMP:${a.timeRamp}`;
                return params;
            }).join(';');
            sendData(cmd);
        }

        function sendReadConfig() {
            const pin = document.getElementById('readPin').value;
            const type = document.getElementById('readType').value;
            if(pin === "NONE") { 
                sendData("READ_NONE_0"); 
                document.getElementById('liveDataDisplay').innerText = "---"; 
            } else { 
                sendData(`READ_${pin}_${type}`); 
            }
        }

        function panicReset() {
            sendData("RESET"); 
            superShortcuts = []; 
            currentBucket = []; 
            renderSuperShortcuts();
            document.getElementById('bucketContainer').style.display = "none";
            document.getElementById('readPin').value = "NONE"; 
            document.getElementById('liveDataDisplay').innerText = "---";
        }

        // Inicjalizacja – ukrycie parametrów przy starcie
        document.addEventListener('DOMContentLoaded', () => {
            toggleTimingParams();
        });
    </script>
</body>
</html>
